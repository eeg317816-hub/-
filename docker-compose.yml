services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: qzgs
      POSTGRES_PASSWORD: qzgs
      POSTGRES_DB: hand_speed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qzgs -d hand_speed"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
